<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <script defer src="script/script.js"></script>
    <title>Les notes de la classe</title>
</head>
<body>
    <h1>📊 Les notes de la classe</h1>
    
    <section>
        <h2>Toutes les notes</h2>
        <ul class="liste-notes"></ul>
    </section>
    
    <section>
        <h2>Statistiques</h2>
        <p>Moyenne de la classe : <span class="moyenne"></span></p>
        <p>Note la plus haute : <span class="max"></span></p>
        <p>Note la plus basse : <span class="min"></span></p>
    </section>
    
    <section>
        <h2>Élèves au-dessus de la moyenne</h2>
        <ul class="liste-reussite"></ul>
    </section>
</body>
</html>
